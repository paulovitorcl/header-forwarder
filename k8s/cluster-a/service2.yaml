---
apiVersion: v1
kind: Namespace
metadata:
  name: header-forwarder
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: service2
  namespace: header-forwarder
  labels:
    app: service2
spec:
  replicas: 1
  selector:
    matchLabels:
      app: service2
  template:
    metadata:
      labels:
        app: service2
    spec:
      containers:
        - name: service2
          image: service2:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: service2
  namespace: header-forwarder
spec:
  selector:
    app: service2
  ports:
    - name: http
      port: 80
      targetPort: 8080
