---
apiVersion: v1
kind: Namespace
metadata:
  name: header-forwarder
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: service3
  namespace: header-forwarder
  labels:
    app: service3
spec:
  replicas: 1
  selector:
    matchLabels:
      app: service3
  template:
    metadata:
      labels:
        app: service3
    spec:
      containers:
        - name: service3
          image: service3:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8080
---
# NodePort exposes Service 3 outside Cluster B so that Service 1 in Cluster A
# can reach it via the Cluster B node's Docker container IP.
apiVersion: v1
kind: Service
metadata:
  name: service3
  namespace: header-forwarder
spec:
  selector:
    app: service3
  ports:
    - name: http
      port: 80
      targetPort: 8080
      nodePort: 30083
  type: NodePort
